name: Publish Privacy Policy (GitHub Pages)

# Hosts the privacy policy + a small landing page on GitHub Pages, giving you a real, public
# Privacy Policy URL to paste into the Play Console (a hard requirement for publishing).
#
# One-time: Settings → Pages → Build and deployment → Source = "GitHub Actions".
# The URL will be:  https://<your-username>.github.io/<repo-name>/privacy.html

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
