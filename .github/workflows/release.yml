name: Release (Android → Google Play)

# Builds a production Android App Bundle on EAS and submits it to a Google Play track.
#
# GitHub Actions is only the orchestrator — EAS Build compiles + signs the .aab in the cloud, and
# EAS Submit uploads it to Google Play. The runner never does a native build.
#
# Personal Google Play accounts (created after ~Nov 2023) must run a CLOSED test with >=12 testers
# for 14 continuous days before the Production track unlocks. So:
#   • Bootstrap phase → run this manually with track = "closed"  (Actions tab → Run workflow)
#   • After the gate is cleared → push a tag  →  goes straight to PRODUCTION
#
# Triggers:
#   • git tag v1.0.0 && git push origin v1.0.0   → builds + submits to PRODUCTION
#   • Actions → Run workflow → pick track         → closed / internal / production
#
# Required repository secrets:
#   EXPO_TOKEN                    – expo.dev access token (Account → Access Tokens)
#   GOOGLE_SERVICE_ACCOUNT_KEY   – contents of the Google Play service-account JSON
#
# One-time credential provisioning (see DEPLOYMENT.md): run `eas build -p android --profile production`
# once locally (or `eas credentials`) so EAS generates & stores the Android upload keystore. CI then
# reuses those EAS-managed credentials with no keys in the repo.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      track:
        description: 'Google Play track to submit to'
        required: true
        default: closed
        type: choice
        options:
          - closed
          - internal
          - production

jobs:
  build-and-submit:
    name: EAS build + submit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version comes from the `packageManager` field in package.json (pnpm@10.x).
        # Don't also set `version` here — action-setup errors if both are specified.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write Google Play service account key
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: printf '%s' "$GOOGLE_SERVICE_ACCOUNT_KEY" > google-service-account.json

      - name: Resolve target track
        id: track
        # A pushed tag is a real release → production. A manual run uses the chosen track.
        run: echo "name=${{ github.event.inputs.track || 'production' }}" >> "$GITHUB_OUTPUT"

      - name: Build (EAS) and auto-submit to Google Play
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --auto-submit-with-profile "${{ steps.track.outputs.name }}"

      # Release notes are pushed after the submit, because supply attaches them to a release that
      # already exists on the track. The text comes from the changelog that release-please generated
      # (see scripts/play-notes.js).
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.10'

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Push release notes to Google Play
        # Non-fatal on purpose: Play can take a little while to surface a freshly uploaded release,
        # and a timing miss here must not fail a build that already shipped. The notes can be
        # re-pushed any time with `fastlane android release_notes track:<track>`.
        continue-on-error: true
        env:
          SUPPLY_JSON_KEY: google-service-account.json
          SUPPLY_TRACK: ${{ steps.track.outputs.name }}
        run: fastlane android release_notes

      - name: Clean up service account key
        if: always()
        run: rm -f google-service-account.json
