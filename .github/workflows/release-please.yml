name: release-please

# Turns Conventional Commits on main into releases.
#
# On every push to main, release-please maintains a "chore: release main" PR that accumulates the
# changelog and version bump. Merging that PR cuts the release: it tags `vX.Y.Z`, publishes the
# GitHub release, and writes CHANGELOG.md.
#
# That tag is what drives shipping — `release.yml` triggers on `v*` and runs the EAS build + Play
# submit. This only works because `token` below is a PAT: GitHub deliberately does not start new
# workflow runs from events created with the default GITHUB_TOKEN, so a tag pushed with it would
# silently never reach release.yml.
#
# Required repository secret:
#   RELEASE_PLEASE_TOKEN – a fine-grained PAT on this repo with Contents: read/write and
#                          Pull requests: read/write. (A classic PAT with `repo` also works.)
#
# Deliberately NOT using manifest mode (release-please-config.json + .release-please-manifest.json).
# With a single package, the Merge plugin opens the release PR on a component-less branch while the
# release step still checks against `getBranchComponent()` — which returns the package.json name and
# ignores `include-component-in-tag`. The two never match, so the PR merges but is never tagged, and
# the run still reports success. Simple mode builds the branch from that same function, so they
# always agree. The cost is that app.json is synced below instead of by `extra-files`.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      # Everything below runs only on the push that actually cuts a release.
      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Setup Node
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Expo's user-facing version lives in app.json and is not managed by EAS (only versionCode
      # is), so it has to follow package.json by hand.
      - name: Sync app.json version
        if: ${{ steps.release.outputs.release_created }}
        run: node scripts/sync-app-version.js

      # Play release notes are deliberately NOT regenerated here.
      #
      # scripts/play-notes.js converts whatever is in CHANGELOG.md, and a release is frequently all
      # `ci:` and `deps:` entries — accurate for a changelog, meaningless to someone reading the
      # store listing. Doing it automatically would silently replace curated copy with commit
      # subjects on every release, which is worse than letting it go stale.
      #
      # Regenerate deliberately instead: Actions -> Push Release Notes, with `regenerate` ticked,
      # or `pnpm changelog:play` locally. Both let you read the result before it ships.
      - name: Show suggested Play release notes
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "Current notes (fastlane/metadata/.../default.txt):"
          cat fastlane/metadata/android/en-US/changelogs/default.txt
          echo
          echo "What the changelog would generate — review before using:"
          node scripts/play-notes.js --check || true

      - name: Commit release artifacts
        if: ${{ steps.release.outputs.release_created }}
        run: |
          if git diff --quiet -- app.json; then
            echo "app.json already matches package.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore(release): sync app version for ${{ steps.release.outputs.tag_name }}"
          git push
